<!DOCTYPE html>
<html lang="en">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="css/style.css">
  <meta name="theme-color" content="#060910">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="assets/icon-192.png">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    /* Inline Auth Specific Styles */
    :root {
      --auth-bg: #060910;
      --auth-accent: #ef4444;
    }

    body {
      background-color: var(--auth-bg);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      overflow-x: hidden;
    }

    .auth-container {
      width: 100%;
      max-width: 420px;
      padding: 2rem;
      animation: fadeIn 0.8s ease;
    }

    .auth-card {
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 24px;
      padding: 2.5rem;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    }

    .auth-header {
      text-align: center;
      margin-bottom: 2rem;
    }

    .auth-logo {
      display: inline-flex;
      align-items: center;
      gap: 0.75rem;
      font-weight: 800;
      font-size: 1.5rem;
      color: #fff;
      margin-bottom: 1rem;
    }
    
    .auth-logo-box {
      width: 64px;
      height: 64px;
      margin: 0 auto 1.5rem auto;
      background-color: #0f172a;
      border: 1px solid #1e293b;
      border-radius: 1.5rem;
      box-shadow: 0 0 50px rgba(0,0,0,0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0.75rem;
      overflow: hidden;
    }
    
    .auth-logo-box img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .auth-logo i {
      color: #ff3b3b;
    }

    .auth-title {
      font-size: 1.75rem;
      font-weight: 700;
      color: #fff;
      margin-bottom: 0.5rem;
    }

    .auth-subtitle {
      color: #94a3b8;
      font-size: 0.875rem;
    }

    .auth-form {
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }

    .input-group {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .input-group label {
      font-size: 0.8125rem;
      font-weight: 500;
      color: #cbd5e1;
    }

    .input-group input {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      padding: 0.75rem 1rem;
      color: #fff;
      font-family: inherit;
      transition: all 0.2s ease;
    }

    .input-group input:focus {
      outline: none;
      border-color: var(--auth-accent);
      background: rgba(255, 255, 255, 0.08);
      box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.15);
    }

    .btn-auth {
      margin-top: 1rem;
      background: var(--auth-accent);
      color: #fff;
      padding: 0.875rem;
      border-radius: 12px;
      font-weight: 600;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      transition: all 0.2s ease;
    }

    .btn-auth:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px -5px rgba(59, 130, 246, 0.4);
    }

    .btn-auth:active {
      transform: translateY(0);
    }

    .auth-footer {
      margin-top: 2rem;
      text-align: center;
      font-size: 0.875rem;
      color: #94a3b8;
    }

    .auth-footer a {
      color: var(--auth-accent);
      text-decoration: none;
      font-weight: 600;
    }

    .auth-footer a:hover {
      text-decoration: underline;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
        /* High-Fidelity SEHAT POINT Branding */
        .brand-container {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 2px;
            padding: 8px 16px;
            background: #064E3B;
            border-radius: 12px;
            border: 1px solid rgba(197, 160, 89, 0.2);
            margin-bottom: 1rem;
        }
        .brand-hindi {
            font-family: 'Hind', sans-serif;
            font-weight: 700;
            color: #C5A059;
            text-shadow: 1px 1px 0px rgba(0,0,0,0.2), 0px 4px 4px rgba(0,0,0,0.1);
            font-size: 1.5rem;
            line-height: 1;
        }
        .brand-english {
            font-family: 'Inter', sans-serif;
            font-weight: 700;
            color: #FFFFFF;
            font-size: 1.35rem;
            line-height: 1;
            margin-top: 4px;
        }
  </style>
</head>
<body>
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-header">
        <div class="brand-container">
            <span class="brand-hindi">सेहत</span>
            <span class="brand-english">Point</span>
        </div>
        <p class="auth-subtitle text-[9px] uppercase tracking-[0.2em] font-black text-slate-500" style="font-size: 10px; font-weight: 800; letter-spacing: 0.15em; text-transform: uppercase;">MASTER DISPATCH CONSOLE</p>
      </div>

      <form class="auth-form" id="loginForm">
        <div class="input-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" placeholder="rahul@example.com" required spellcheck="false" autocapitalize="none" autocomplete="email">
        </div>
        <div class="input-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="••••••••" required spellcheck="false" autocapitalize="none" autocomplete="current-password">
        </div>
        <button type="submit" class="btn-auth" id="submitBtn">
          Sign In
          <i data-lucide="log-in"></i>
        </button>
      </form>

      <div id="resendSection" style="display:none; margin-top:1.5rem; text-align:center; padding:1rem; background:rgba(59,130,246,0.05); border:1px solid rgba(59,130,246,0.2); border-radius:12px;">
        <p style="font-size:0.8125rem; color:#94a3b8; margin-bottom:0.75rem;">Haven't received the link?</p>
        <button onclick="resendEmail()" class="btn-auth" style="margin-top:0; background:transparent; border:1px solid var(--auth-accent); color:var(--auth-accent); font-size:0.75rem; padding:0.5rem 1rem;">
          Resend Confirmation Email
        </button>
      </div>

      <div class="auth-footer">
        <span style="opacity: 0.5;">Restricted Access Protocol Active</span>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-config.js"></script>
  <script src="js/auth.js"></script>
  <script>
    lucide.createIcons();

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      btn.disabled = true;
      btn.innerHTML = '<i data-lucide="loader" class="animate-pulse"></i> Signing In...';
      lucide.createIcons();

      try {
        await Auth.signIn(email.trim(), password);
        window.location.href = 'admin.html';
      } catch (err) {
        alert('SignIn Failed: ' + (err.message || 'Check your credentials and try again'));
        if (err.message.includes('confirm your email')) {
          document.getElementById('resendSection').style.display = 'block';
        }
        btn.disabled = false;
        btn.innerHTML = 'Sign In <i data-lucide="log-in"></i>';
        lucide.createIcons();
      }
    });

    async function resendEmail() {
      const email = document.getElementById('email').value.trim();
      if (!email) return alert('Please enter your email address first.');
      
      try {
        await Auth.resendConfirmation(email);
        alert('Confirmation email sent! Please check your inbox.');
      } catch (err) {
        console.error('Resend Error:', err);
        const detail = err.message || JSON.stringify(err);
        alert('Failed to resend: ' + detail + '\n\nTry again in a few minutes or check your Supabase Auth logs.');
      }
    }
  </script>
  <script>
      if ('serviceWorker' in navigator) {
          window.addEventListener('load', () => {
              navigator.serviceWorker.register('service-worker.js')
                  .then(reg => console.log('PWA Sync Alpha: Ready'))
                  .catch(e => console.error('PWA Sync Alpha: Failed', e));
          });
      }
  </script>
</body>
</html>
