<!DOCTYPE html>
<html lang="en">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In | Sehat Point</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="css/style.css">
  <meta name="theme-color" content="#060910">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="assets/icon-192.png">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@0.460.0"></script>
  <style>
    /* Inline Auth Specific Styles */
    :root {
      --auth-bg: #060910;
      --auth-accent: #3b82f6;
    }

    body {
      background-color: var(--auth-bg);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      overflow-x: hidden;
    }

    .auth-container {
      width: 100%;
      max-width: 420px;
      padding: 2rem;
      animation: fadeIn 0.8s ease;
    }

    .auth-card {
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 24px;
      padding: 2.5rem;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    }

    .auth-header {
      text-align: center;
      margin-bottom: 2rem;
    }

    .auth-logo {
      display: inline-flex;
      align-items: center;
      gap: 0.75rem;
      font-weight: 800;
      font-size: 1.5rem;
      color: #fff;
      margin-bottom: 1rem;
    }
    
    .auth-logo-box {
      width: 64px;
      height: 64px;
      margin: 0 auto 1.5rem auto;
      background-color: #0f172a;
      border: 1px solid #1e293b;
      border-radius: 1.5rem;
      box-shadow: 0 0 50px rgba(0,0,0,0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0.75rem;
      overflow: hidden;
    }
    
    .auth-logo-box img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .auth-logo i {
      color: #ff3b3b;
    }

    .auth-title {
      font-size: 1.75rem;
      font-weight: 700;
      color: #fff;
      margin-bottom: 0.5rem;
    }

    .auth-subtitle {
      color: #94a3b8;
      font-size: 0.875rem;
    }

    .auth-form {
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }

    .input-group {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .input-group label {
      font-size: 0.8125rem;
      font-weight: 500;
      color: #cbd5e1;
    }

    .input-group input {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      padding: 0.75rem 1rem;
      color: #fff;
      font-family: inherit;
      transition: all 0.2s ease;
    }

    .input-group input:focus {
      outline: none;
      border-color: var(--auth-accent);
      background: rgba(255, 255, 255, 0.08);
      box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.15);
    }

    .btn-auth {
      margin-top: 1rem;
      background: var(--auth-accent);
      color: #fff;
      padding: 0.875rem;
      border-radius: 12px;
      font-weight: 600;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      transition: all 0.2s ease;
    }

    .btn-auth:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px -5px rgba(59, 130, 246, 0.4);
    }

    .btn-auth:active {
      transform: translateY(0);
    }

    .auth-footer {
      margin-top: 2rem;
      text-align: center;
      font-size: 0.875rem;
      color: #94a3b8;
    }

    .auth-footer a {
      color: var(--auth-accent);
      text-decoration: none;
      font-weight: 600;
    }

    .auth-footer a:hover {
      text-decoration: underline;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
        /* High-Fidelity SEHAT POINT Branding */
        .brand-container {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 2px;
            padding: 8px 16px;
            background: #064E3B;
            border-radius: 12px;
            border: 1px solid rgba(197, 160, 89, 0.2);
            margin-bottom: 1rem;
        }
        .brand-hindi {
            font-family: 'Hind', sans-serif;
            font-weight: 700;
            color: #C5A059;
            text-shadow: 1px 1px 0px rgba(0,0,0,0.2), 0px 4px 4px rgba(0,0,0,0.1);
            font-size: 1.5rem;
            line-height: 1;
        }
        .brand-english {
            font-family: 'Inter', sans-serif;
            font-weight: 700;
            color: #FFFFFF;
            font-size: 1.35rem;
            line-height: 1;
            margin-top: 4px;
        }
    </style>
</head>
<body>
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-header">
        <div class="brand-container" style="background: rgba(2, 132, 199, 0.1); border-color: rgba(2, 132, 199, 0.2);">
            <span class="brand-hindi" style="color: #0284c7;">सेहत</span>
            <span class="brand-english" style="color: #ffffff;">Point</span>
        </div>
        <p class="auth-subtitle uppercase tracking-[0.2em] font-black text-slate-500" style="font-size: 10px; font-weight: 800; letter-spacing: 0.15em;">PATIENT ACCESS PORTAL</p>
      </div>

      <form class="auth-form" id="loginForm">
        <div class="input-group">
          <label for="email">Patient Email Address</label>
          <input type="email" id="email" placeholder="vivek@example.com" required spellcheck="false" autocapitalize="none" autocomplete="email">
        </div>
        <div class="input-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="••••••••" required spellcheck="false" autocapitalize="none" autocomplete="current-password">
        </div>
        <button type="submit" class="btn-auth" id="submitBtn" style="background: #0284c7; box-shadow: 0 4px 15px rgba(2, 132, 199, 0.3);">
          Enter Wallet
          <i data-lucide="shield-check"></i>
        </button>
      </form>

      <div id="resendSection" style="display:none; margin-top:1.5rem; text-align:center; padding:1rem; background:rgba(2, 132, 199, 0.05); border:1px solid rgba(2, 132, 199, 0.2); border-radius:12px;">
        <p style="font-size:0.8125rem; color:#94a3b8; margin-bottom:0.75rem;">Verification missing?</p>
        <button onclick="resendEmail(event)" class="btn-auth" style="margin-top:0; background:transparent; border:1px solid #0284c7; color:#0284c7; font-size:0.75rem; padding:0.5rem 1rem;">
          Resend Verification Link
        </button>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-config.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/auth.js"></script>
  <script>
    lucide.createIcons();

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      btn.disabled = true;
      btn.innerHTML = '<i data-lucide="loader" class="animate-pulse"></i> Signing In...';
      lucide.createIcons();

      try {
        await Auth.signIn(email.trim(), password, 'user');
        
        // ─── NEW: Total Propagation & Sync Recovery ───
        btn.innerHTML = '<i data-lucide="refresh-cw" class="animate-spin w-4 h-4"></i> Synchronizing Records...';
        lucide.createIcons();
        
        // 1.5s Safety Window for Cloud Identity Propagation
        await new Promise(resolve => setTimeout(resolve, 1500));

        if (window.AppStorage) {
            console.log('[Auth] Verifying Medical Registry after propagation window...');
            
            // Force a deep cloud pull to see if any profiles were just claimed
            const profiles = await window.AppStorage.getAllPatients();
            
            if (!profiles || profiles.length === 0) {
                console.warn('[Auth] No existing records found. Attempting emergency recovery sweep...');
                const recovery = await window.AppStorage.claimProfilesByEmail(email.trim());
                
                if (recovery.success && recovery.claimedCount > 0) {
                   console.log('[Auth] Recovery Success: Claimed ' + recovery.claimedCount + ' profiles. Refreshing registry...');
                   await window.AppStorage.getAllPatients(); // Re-fetch after recovery
                } else {
                   console.warn('[Auth] Clinical initialization required. Advancing to registration portal.');
                   window.location.href = 'register.html';
                   return;
                }
            }
        }
        
        window.location.href = 'dashboard.html';
      } catch (err) {
        console.error('Login Failed:', err);
        
        // Show context-aware alerts
        if (err.message.includes('verification') || err.message.includes('confirm')) {
           alert('ACTION REQUIRED: ' + err.message);
           document.getElementById('resendSection').style.display = 'block';
        } else if (err.message.includes('attempts')) {
           alert('SECURITY BLOCK: ' + err.message);
        } else {
           alert('SIGN IN ERROR: ' + err.message);
        }

        btn.disabled = false;
        btn.innerHTML = 'Sign In <i data-lucide="log-in"></i>';
        lucide.createIcons();
      }
    });

    async function resendEmail(event) {
      const emailInput = document.getElementById('email');
      const email = emailInput.value.trim();
      
      if (!email) {
          alert('Please enter your email above to resend the link.');
          emailInput.focus();
          return;
      }
      
      try {
        const btn = event.target.closest('button');
        const originalHtml = btn.innerHTML;
        btn.disabled = true;
        btn.innerHTML = '<i data-lucide="loader" class="animate-spin w-3 h-3"></i> Sending...';
        
        await Auth.resendConfirmation(email);
        
        btn.innerHTML = '<i data-lucide="check" class="w-3 h-3 text-emerald-400"></i> Dispatched';
        setTimeout(() => {
          btn.disabled = false;
          btn.innerHTML = originalHtml;
          lucide.createIcons();
        }, 5000);
        
      } catch (err) {
        console.error('Resend failed:', err);
        alert('Resend attempt failed: ' + err.message);
        btn.disabled = false;
        btn.innerHTML = originalHtml;
        lucide.createIcons();
      }
    }
  </script>
</body>
</html>
