<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SignUp — First Emergency Response SaaS</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/auth.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    /* Inline Auth Specific Styles */
    :root {
      --auth-bg: #060910;
      --auth-accent: #3b82f6;
    }

    body {
      background-color: var(--auth-bg);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      overflow-x: hidden;
    }

    .auth-container {
      width: 100%;
      max-width: 420px;
      padding: 2rem;
      animation: fadeIn 0.8s ease;
    }

    .auth-card {
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 24px;
      padding: 2.5rem;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    }

    .auth-header {
      text-align: center;
      margin-bottom: 2rem;
    }

    .auth-logo {
      display: inline-flex;
      align-items: center;
      gap: 0.75rem;
      font-weight: 800;
      font-size: 1.5rem;
      color: #fff;
      margin-bottom: 1rem;
    }

    .auth-logo i {
      color: #ff3b3b;
    }

    .auth-title {
      font-size: 1.75rem;
      font-weight: 700;
      color: #fff;
      margin-bottom: 0.5rem;
    }

    .auth-subtitle {
      color: #94a3b8;
      font-size: 0.875rem;
    }

    .auth-form {
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }

    .input-group {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .input-group label {
      font-size: 0.8125rem;
      font-weight: 500;
      color: #cbd5e1;
    }

    .input-group input {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      padding: 0.75rem 1rem;
      color: #fff;
      font-family: inherit;
      transition: all 0.2s ease;
    }

    .input-group input:focus {
      outline: none;
      border-color: var(--auth-accent);
      background: rgba(255, 255, 255, 0.08);
      box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.15);
    }

    .btn-auth {
      margin-top: 1rem;
      background: var(--auth-accent);
      color: #fff;
      padding: 0.875rem;
      border-radius: 12px;
      font-weight: 600;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      transition: all 0.2s ease;
    }

    .btn-auth:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px -5px rgba(59, 130, 246, 0.4);
    }

    .btn-auth:active {
      transform: translateY(0);
    }

    .auth-footer {
      margin-top: 2rem;
      text-align: center;
      font-size: 0.875rem;
      color: #94a3b8;
    }

    .auth-footer a {
      color: var(--auth-accent);
      text-decoration: none;
      font-weight: 600;
    }

    .auth-footer a:hover {
      text-decoration: underline;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-header">
        <div class="auth-logo">
          <div class="w-12 h-12 bg-slate-900 rounded-xl overflow-hidden border border-slate-800 shadow-2xl mx-auto mb-4">
            <img src="assets/logo.png" alt="Logo" class="w-full h-full object-cover">
          </div>
        </div>
        <h1 class="auth-title font-black italic tracking-tighter">SEHAT POINT</h1>
        <p class="auth-subtitle">Join the professional emergency network</p>
      </div>

      <form class="auth-form" id="signupForm">
        <div class="input-group">
          <label for="fullName">Full Name</label>
          <input type="text" id="fullName" placeholder="Rahul Sharma" required>
        </div>
        <div class="input-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" placeholder="rahul@example.com" required>
        </div>
        <div class="input-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="••••••••" required minlength="6">
        </div>
        <button type="submit" class="btn-auth" id="submitBtn">
          Create Account
          <i data-lucide="arrow-right"></i>
        </button>
      </form>

      <div class="auth-footer">
        Already have an account? <a href="login.html">Sign In</a>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-config.js"></script>
  <script src="js/auth.js"></script>
  <script>
    lucide.createIcons();

    document.getElementById('signupForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const fullName = document.getElementById('fullName').value;

      btn.disabled = true;
      btn.innerHTML = '<i data-lucide="loader" class="animate-pulse"></i> Creating...';
      lucide.createIcons();

      try {
        const data = await Auth.signUp(email.trim(), password, fullName);
        
        if (data.session) {
          alert('Welcome! Your account has been created successfully. Redirecting to dashboard...');
          window.location.href = 'dashboard.html';
        } else {
          alert('Account created! Please check your email and click the confirmation link before signing in.');
          window.location.href = 'login.html';
        }
      } catch (err) {
        alert(err.message || 'Error creating account');
        btn.disabled = false;
        btn.innerHTML = 'Create Account <i data-lucide="arrow-right"></i>';
        lucide.createIcons();
      }
    });
  </script>
</body>
</html>
