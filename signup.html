<!DOCTYPE html>
<html lang="en">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="css/style.css">
  <meta name="theme-color" content="#060910">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="assets/icon-192.png">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    /* Inline Auth Specific Styles */
    :root {
      --auth-bg: #060910;
      --auth-accent: #3b82f6;
    }

    body {
      background-color: var(--auth-bg);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      overflow-x: hidden;
    }

    .auth-container {
      width: 100%;
      max-width: 420px;
      padding: 2rem;
      animation: fadeIn 0.8s ease;
    }

    .auth-card {
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 24px;
      padding: 2.5rem;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    }

    .auth-header {
      text-align: center;
      margin-bottom: 2rem;
    }

    .auth-logo {
      display: inline-flex;
      align-items: center;
      gap: 0.75rem;
      font-weight: 800;
      font-size: 1.5rem;
      color: #fff;
      margin-bottom: 1rem;
    }
    
    .auth-logo-box {
      width: 64px;
      height: 64px;
      margin: 0 auto 1.5rem auto;
      background-color: #0f172a;
      border: 1px solid #1e293b;
      border-radius: 1.5rem;
      box-shadow: 0 0 50px rgba(0,0,0,0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0.75rem;
      overflow: hidden;
    }
    
    .auth-logo-box img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .auth-logo i {
      color: #ff3b3b;
    }

    .auth-title {
      font-size: 1.75rem;
      font-weight: 700;
      color: #fff;
      margin-bottom: 0.5rem;
    }

    .auth-subtitle {
      color: #94a3b8;
      font-size: 0.875rem;
    }

    .auth-form {
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }

    .input-group {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .input-group label {
      font-size: 0.8125rem;
      font-weight: 500;
      color: #cbd5e1;
    }

    .input-group input {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      padding: 0.75rem 1rem;
      color: #fff;
      font-family: inherit;
      transition: all 0.2s ease;
    }

    .input-group input:focus {
      outline: none;
      border-color: var(--auth-accent);
      background: rgba(255, 255, 255, 0.08);
      box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.15);
    }

    .btn-auth {
      margin-top: 1rem;
      background: var(--auth-accent);
      color: #fff;
      padding: 0.875rem;
      border-radius: 12px;
      font-weight: 600;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      transition: all 0.2s ease;
    }

    .btn-auth:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px -5px rgba(59, 130, 246, 0.4);
    }

    .btn-auth:active {
      transform: translateY(0);
    }

    .auth-footer {
      margin-top: 2rem;
      text-align: center;
      font-size: 0.875rem;
      color: #94a3b8;
    }

    .auth-footer a {
      color: var(--auth-accent);
      text-decoration: none;
      font-weight: 600;
    }

    .auth-footer a:hover {
      text-decoration: underline;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
        /* High-Fidelity SEHAT POINT Branding */
        .brand-container {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 2px;
            padding: 8px 16px;
            background: #064E3B;
            border-radius: 12px;
            border: 1px solid rgba(197, 160, 89, 0.2);
            margin-bottom: 1rem;
        }
        .brand-hindi {
            font-family: 'Hind', sans-serif;
            font-weight: 700;
            color: #C5A059;
            text-shadow: 1px 1px 0px rgba(0,0,0,0.2), 0px 4px 4px rgba(0,0,0,0.1);
            font-size: 1.5rem;
            line-height: 1;
        }
        .brand-english {
            font-family: 'Inter', sans-serif;
            font-weight: 700;
            color: #FFFFFF;
            font-size: 1.35rem;
            line-height: 1;
            margin-top: 4px;
        }
  </style>
</head>
<body>
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-header">
        <div class="brand-container" style="background: rgba(2, 132, 199, 0.1); border-color: rgba(2, 132, 199, 0.2);">
            <span class="brand-hindi" style="color: #0284c7;">सेहत</span>
            <span class="brand-english" style="color: #ffffff;">Point</span>
        </div>
        <p class="auth-subtitle uppercase tracking-[0.2em] font-black text-slate-500" style="font-size: 10px; font-weight: 800; letter-spacing: 0.15em;">CREATE MEDICAL ID</p>
      </div>

      <form class="auth-form" id="signupForm">
        <div class="input-group">
          <label for="fullName">Full Name</label>
          <input type="text" id="fullName" placeholder="Rahul Sharma" required>
        </div>
        <div class="input-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" placeholder="rahul@example.com" required>
        </div>
        <div class="input-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="••••••••" required minlength="6">
        </div>
        <button type="submit" class="btn-auth" id="submitBtn" style="background: #0284c7; box-shadow: 0 4px 15px rgba(2, 132, 199, 0.3);">
          Create Medical ID
          <i data-lucide="arrow-right"></i>
        </button>
      </form>

      <div class="auth-footer" style="border-top: 1px solid rgba(255,255,255,0.05); padding-top: 1.5rem;">
        Already have a profile? <a href="login.html" style="color: #0284c7; font-weight: 800;">Sign In</a>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-config.js?v=15-sync"></script>
  <script src="js/storage.js?v=15-sync"></script>
  <script src="js/auth.js?v=15-sync"></script>
  <script>
    lucide.createIcons();

    document.getElementById('signupForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const fullName = document.getElementById('fullName').value;

      btn.disabled = true;
      btn.innerHTML = '<i data-lucide="loader" class="animate-pulse"></i> Creating...';
      lucide.createIcons();

      try {
        const data = await Auth.signUp(email.trim(), password, fullName);
        
        if (data.session) {
          alert('Welcome! Your account has been created successfully. Redirecting to dashboard...');
          window.location.href = 'dashboard.html?name=' + encodeURIComponent(fullName) + '&email=' + encodeURIComponent(email);
        } else {
          // Check if user was actually created despite email error
          if (data.user) {
             alert('IMPORTANT: Your account was created, but our email server is hitting its daily limit. \n\nPLEASE PROCEED: You can try to Sign In directly. If it fails with "Email not confirmed", please ask the administrator to disable "Confirm Email" in Supabase Auth settings.');
             window.location.href = 'login.html?email=' + encodeURIComponent(email);
          } else {
             alert('Account created! Please check your email and click the confirmation link before signing in.');
             window.location.href = 'login.html?name=' + encodeURIComponent(fullName) + '&email=' + encodeURIComponent(email);
          }
        }
      } catch (err) {
        let msg = err.message || 'Error creating account';
        if (msg.includes('rate limit') || msg.includes('confirmation email')) {
            msg = 'ERROR: Email limit reached. Your account might have been created anyway. Please try to Sign In or ask the admin to disable email confirmation.';
        }
        alert(msg);
        btn.disabled = false;
        btn.innerHTML = 'Create Account <i data-lucide="arrow-right"></i>';
        lucide.createIcons();
      }
    });
  </script>
  <script>
      if ('serviceWorker' in navigator) {
          window.addEventListener('load', () => {
              navigator.serviceWorker.register('service-worker.js')
                  .then(reg => console.log('PWA Sync Alpha: Ready'))
                  .catch(e => console.error('PWA Sync Alpha: Failed', e));
          });
      }
  </script>
</body>
</html>
