<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard | Sehat Point</title>
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'sans-serif'] },
          colors: {
            clinical: {
                red: '#ef4444',
                amber: '#f59e0b',
                slate: '#0f172a',
                emerald: '#10b981',
                paper: '#f8fafc'
            }
          }
        }
      }
    }
  </script>

  <style>
    ::-webkit-scrollbar { display: none; }
    body { background-color: #e2e8f0; }
    .nav-tab.active { color: #0f172a; border-top: 2.5px solid #0f172a; }
  </style>
</head>
<body class="font-sans text-slate-900 antialiased flex justify-center min-h-screen py-0 md:py-8">

  <!-- Mobile App Container -->
  <main class="w-full max-w-[400px] bg-clinical-paper min-h-screen relative shadow-2xl md:rounded-[2.5rem] overflow-hidden border-[6px] border-slate-800 md:h-[850px] flex flex-col">
    
    <!-- Top Header -->
    <header class="bg-slate-900 text-white px-5 py-4 flex justify-between items-center sticky top-0 z-50 shadow-md">
      <div class="flex items-center gap-2">
        <div class="logo-cube bg-blue-600 p-1.5 rounded-lg">
          <i data-lucide="shield-plus" class="w-4 h-4"></i>
        </div>
        <span class="text-[12px] font-black tracking-widest uppercase">Sehat Point</span>
      </div>
      <div class="flex items-center gap-2">
        <div id="gps-status" class="flex items-center gap-1.5 bg-slate-800 px-2.5 py-1 rounded-full border border-slate-700">
          <span class="w-2 h-2 bg-slate-500 rounded-full" id="gps-dot"></span>
          <span class="text-[10px] font-bold text-slate-400 uppercase" id="gps-text">NO_SYNC</span>
        </div>
      </div>
    </header>

    <!-- App Content Area (Scrollable) -->
    <div class="flex-1 overflow-y-auto pb-24 pt-4" id="app-container">
      
      <!-- ─── TAB: OVERVIEW ─── -->
      <div id="tab-overview" class="tab-content px-5 space-y-6">
        <!-- Patient Switcher Hero -->
        <div class="bg-white rounded-3xl p-5 border border-slate-200 shadow-sm">
          <div class="flex justify-between items-start mb-4">
            <div>
              <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">Active Profile</p>
              <h2 class="text-xl font-black text-slate-900" id="welcome-msg">Loading...</h2>
            </div>
            <div class="bg-slate-100 p-2 rounded-2xl">
              <select id="patientSwitcher" class="bg-transparent border-none text-[10px] font-black uppercase text-slate-600 focus:ring-0">
                <option>Loading...</option>
              </select>
            </div>
          </div>
          
          <div class="flex gap-2">
            <a href="register.html" class="flex-1 bg-slate-900 text-white py-3 rounded-2xl text-center text-[10px] font-black uppercase tracking-widest flex items-center justify-center gap-2">
              <i data-lucide="plus-circle" class="w-3 h-3"></i> New Profile
            </a>
            <button onclick="window.Storage.triggerSOSAlert(null,0,0)" class="flex-1 bg-red-50 text-red-600 border border-red-100 py-3 rounded-2xl text-center text-[10px] font-black uppercase tracking-widest flex items-center justify-center gap-2">
                <i data-lucide="alert-circle" class="w-3 h-3"></i> SOS Test
              </button>
          </div>
        </div>

        <!-- Dashboard Stats Grid -->
        <div class="grid grid-cols-2 gap-3">
          <div id="gps-stat-card" class="bg-white p-4 rounded-2xl border border-slate-200 shadow-sm flex flex-col justify-between cursor-pointer active:scale-95 transition-all">
            <div class="w-8 h-8 bg-blue-50 text-blue-600 rounded-xl flex items-center justify-center mb-3">
              <i data-lucide="map-pin" class="w-4 h-4"></i>
            </div>
            <div>
              <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Live GPS</span>
              <p class="text-xs font-black text-slate-800" id="stat-gps">Tap to Sync</p>
            </div>
          </div>

          <div class="bg-white p-4 rounded-2xl border border-slate-200 shadow-sm flex flex-col justify-between">
            <div class="w-8 h-8 bg-emerald-50 text-emerald-600 rounded-xl flex items-center justify-center mb-3">
              <i data-lucide="scan" class="w-4 h-4"></i>
            </div>
            <div>
              <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Total Scans</span>
              <p class="text-xs font-black text-slate-800" id="stat-scans">--</p>
            </div>
          </div>
        </div>

        <!-- Medical ID Preview Card -->
        <div id="emergency-card-preview" class="hidden">
           <!-- Rendered by JS -->
        </div>

        <!-- Global Sync Status -->
        <div class="bg-emerald-50 border border-emerald-100 rounded-2xl p-4 flex items-center gap-3">
            <div class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></div>
            <p class="text-[10px] font-bold text-emerald-700 tracking-wider">SYNCING WITH SEHAT CENTRAL...</p>
        </div>
      </div>

      <!-- ─── TAB: PROFILES ─── -->
      <div id="tab-patients" class="tab-content hidden px-5 space-y-4">
        <h2 class="text-sm font-black text-slate-800 uppercase tracking-widest">Patient Profiles</h2>
        <div id="patients-list" class="space-y-3">
            <!-- Populated by JS -->
        </div>
      </div>

      <!-- ─── TAB: ACTIVITY ─── -->
      <div id="tab-activity" class="tab-content hidden px-5 space-y-4">
        <h2 class="text-sm font-black text-slate-800 uppercase tracking-widest">Emergency Activity</h2>
        <div id="activity-list" class="space-y-3">
            <!-- Populated by JS -->
        </div>
      </div>

    </div>

    <!-- BOTTOM TAB NAVIGATION -->
    <nav class="absolute bottom-0 left-0 right-0 bg-white shadow-[0_-10px_40px_rgba(0,0,0,0.05)] border-t border-slate-200 px-6 pt-2 pb-8 flex justify-between z-50">
      <button onclick="switchTab('tab-overview')" class="nav-tab active flex flex-col items-center gap-1 p-2 transition-all">
        <i data-lucide="layout-dashboard" class="w-5 h-5"></i>
        <span class="text-[10px] font-bold uppercase tracking-widest">Center</span>
      </button>
      <button onclick="switchTab('tab-patients')" class="nav-tab flex flex-col items-center gap-1 p-2 text-slate-400 transition-all">
        <i data-lucide="users" class="w-5 h-5"></i>
        <span class="text-[10px] font-bold uppercase tracking-widest">Users</span>
      </button>
      <button onclick="switchTab('tab-activity')" class="nav-tab flex flex-col items-center gap-1 p-2 text-slate-400 transition-all">
        <i data-lucide="activity" class="w-5 h-5"></i>
        <span class="text-[10px] font-bold uppercase tracking-widest">Sos</span>
      </button>
      <button onclick="window.Auth.signOut()" class="flex flex-col items-center gap-1 p-2 text-slate-400">
        <i data-lucide="log-out" class="w-5 h-5"></i>
        <span class="text-[10px] font-bold uppercase tracking-widest">Exit</span>
      </button>
    </nav>
  </main>

  <!-- PWA & Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-config.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/dashboard.js"></script>
  <script>
    // Tab Switching Logic
    function switchTab(tabId) {
      document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));
      document.getElementById(tabId).classList.remove('hidden');
      
      document.querySelectorAll('.nav-tab').forEach(n => n.classList.remove('active', 'text-slate-900'));
      document.querySelectorAll('.nav-tab').forEach(n => n.classList.add('text-slate-400'));
      
      const activeTab = Array.from(document.querySelectorAll('.nav-tab')).find(n => n.getAttribute('onclick').includes(tabId));
      if(activeTab) {
        activeTab.classList.add('active', 'text-slate-900');
        activeTab.classList.remove('text-slate-400');
      }
    }
  </script>
</body>
</html>
