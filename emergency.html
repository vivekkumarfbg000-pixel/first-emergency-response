<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚕ EMERGENCY PROFILE | Sehat Point</title>
    <meta name="description" content="Emergency medical profile — critical health data for first responders.">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>
    <style>
        :root {
            --card-bg: #ffffff;
            --header-red: #e11d48;
            --blood-bg: #fff1f2;
            --blood-text: #991b1b;
            --allergy-bg: #fff7ed;
            --allergy-text: #9a3412;
            --condition-bg: #fefce8;
            --condition-text: #854d0e;
            --text-dark: #1e293b;
            --text-muted: #64748b;
        }

        body {
            background: url('assets/emergency_bg.png') no-repeat center center fixed;
            background-size: cover;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            font-family: 'Inter', -apple-system, sans-serif;
            color: var(--text-dark);
        }

        .profile-container {
            width: 100%;
            max-width: 420px;
            background: var(--card-bg);
            border-radius: 28px;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ─── Header ─── */
        .emergency-banner {
            background: var(--header-red);
            color: white;
            padding: 1rem 1.25rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .banner-left {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            font-weight: 800;
            font-size: 0.85rem;
            letter-spacing: 0.02em;
            text-transform: uppercase;
        }

        .lang-toggle {
            background: rgba(255, 255, 255, 0.2);
            padding: 0.35rem 0.75rem;
            border-radius: 99px;
            font-size: 0.75rem;
            font-weight: 600;
            display: flex;
            gap: 0.5rem;
        }

        .lang-toggle span.active { color: white; }
        .lang-toggle span { opacity: 0.7; cursor: pointer; }

        /* ─── Content ─── */
        .profile-content {
            padding: 1.5rem;
        }

        .patient-header {
            margin-bottom: 1.25rem;
        }

        .patient-name {
            font-size: 1.5rem;
            font-weight: 800;
            color: #0f172a;
            margin-bottom: 0.35rem;
        }

        .last-updated {
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            background: #f1f5f9;
            padding: 0.25rem 0.6rem;
            border-radius: 6px;
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
        }

        /* ─── Vital Rows ─── */
        .vital-box {
            padding: 1rem;
            border-radius: 12px;
            margin-bottom: 0.75rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            border: 1px solid rgba(0,0,0,0.03);
        }

        .vital-box i { width: 20px; height: 20px; opacity: 0.9; }

        .vital-label {
            font-size: 0.65rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            display: block;
            margin-bottom: 0.1rem;
        }

        .vital-value {
            font-size: 1rem;
            font-weight: 700;
        }

        .box-blood { background: var(--blood-bg); color: var(--blood-text); }
        .box-allergy { background: var(--allergy-bg); color: var(--allergy-text); }
        .box-condition { background: var(--condition-bg); color: var(--condition-text); }

        .high-risk-tag {
            background: #f97316;
            color: white;
            font-size: 0.65rem;
            font-weight: 800;
            padding: 0.2rem 0.6rem;
            border-radius: 4px;
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            margin-top: 0.5rem;
            text-transform: uppercase;
        }

        /* ─── Contact ─── */
        .contact-box {
            background: #f8fafc;
            padding: 1rem;
            border-radius: 12px;
            margin-top: 1rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .contact-icon {
            width: 36px; height: 36px;
            background: white;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            color: #10b981;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
        }

        .contact-info b { font-size: 0.85rem; display: block; }
        .contact-info span { font-size: 0.95rem; font-weight: 700; color: #0f172a; }

        /* ─── Buttons ─── */
        .action-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.75rem;
            margin-top: 1.5rem;
        }

        .action-btn {
            padding: 0.85rem;
            border-radius: 10px;
            font-weight: 800;
            font-size: 0.85rem;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            color: white;
            border: none;
            cursor: pointer;
            text-decoration: none;
        }

        .btn-family { background: #22c55e; }
        .btn-ambulance { background: var(--header-red); }
        .btn-clinic { 
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            grid-column: span 2;
            margin-top: 0.25rem;
        }

        /* ─── QR Section ─── */
        .qr-footer {
            background: #f1f5f9;
            padding: 2rem 1.5rem;
            text-align: center;
            border-top: 1px solid #e2e8f0;
        }

        .qr-card-wrap {
            background: white;
            padding: 1rem;
            border-radius: 16px;
            display: inline-block;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
        }

        .qr-instruction {
            margin-top: 1rem;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-muted);
        }

        .lock-link {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.4rem;
            font-size: 0.75rem;
            font-weight: 700;
            color: #334155;
            margin-top: 1rem;
            opacity: 0.8;
            cursor: pointer;
        }

        /* ─── SEO/Header ─── */
        .sehat-point-logo {
            text-align: center;
            padding: 1rem 0 0.5rem;
            font-weight: 900;
            font-size: 1.1rem;
            letter-spacing: -0.02em;
        }
        .sehat-point-logo span { color: var(--header-red); }

        @media screen and (max-height: 800px) {
            body { padding: 1rem; }
            .profile-container { border-radius: 20px; }
            .profile-content { padding: 1.25rem; }
        }
    </style>
</head>
<body>
    <div id="app-root"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/storage.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const params = new URLSearchParams(window.location.search);
            let patient = null;

            // Decode data (Offline First)
            const encodedData = params.get('data');
            if (encodedData) {
                try {
                    patient = window.Storage.decodeFromURL(encodedData);
                } catch (e) { console.error('Decode failed', e); }
            }

            // Cloud Fetch if needed
            const id = params.get('id');
            if (!patient && id) {
                try {
                    const { data: row } = await window.supabaseClient.from('patients').select('*').eq('patient_id', id).single();
                    if (row) patient = window.Storage.mapFromDB(row);
                } catch (e) {}
            }

            if (!patient) {
                document.getElementById('app-root').innerHTML = "<h1>Profile Not Found</h1>";
                return;
            }

            const today = new Date().toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric' });

            document.getElementById('app-root').innerHTML = `
                <div class="profile-container">
                    <div class="sehat-point-logo">SEHAT <span>POINT</span></div>
                    
                    <div class="emergency-banner">
                        <div class="banner-left">
                            <i data-lucide="truck"></i>
                            EMERGENCY – PLEASE HELP
                        </div>
                        <div class="lang-toggle">
                            <span class="active">EN</span> | <span>हिंदी</span>
                        </div>
                    </div>

                    <div class="profile-content">
                        <div class="patient-header">
                            <div class="patient-name">${patient.fullName}</div>
                            <div class="last-updated">
                                <i data-lucide="clock"></i>
                                LAST UPDATED: ${today}
                            </div>
                        </div>

                        <div class="vital-box box-blood">
                            <i data-lucide="droplet"></i>
                            <div>
                                <span class="vital-label">BLOOD GROUP:</span>
                                <span class="vital-value">${patient.bloodGroup}</span>
                            </div>
                        </div>

                        <div class="vital-box box-allergy">
                            <i data-lucide="alert-triangle"></i>
                            <div>
                                <span class="vital-label">ALLERGY:</span>
                                <span class="vital-value">${patient.allergies || 'NONE'}</span>
                            </div>
                        </div>

                        <div class="vital-box box-condition">
                            <i data-lucide="heart"></i>
                            <div>
                                <span class="vital-label">CONDITION:</span>
                                <span class="vital-value">${patient.conditions || 'STABLE'}</span>
                            </div>
                            ${patient.conditions?.toLowerCase().includes('high bp') || patient.conditions?.toLowerCase().includes('diabetes') ? 
                                `<div class="high-risk-tag"><i data-lucide="alert-circle"></i> HIGH RISK PATIENT</div>` : ''}
                        </div>

                        <div class="contact-box">
                            <div class="contact-icon"><i data-lucide="phone"></i></div>
                            <div class="contact-info">
                                <b>EMERGENCY CONTACT: ${patient.contact1_Name}</b>
                                <span>${patient.contact1_Phone}</span>
                            </div>
                        </div>

                        <div class="action-grid">
                            <a href="tel:${patient.contact1_Phone}" class="action-btn btn-family">
                                <i data-lucide="phone"></i> CALL FAMILY
                            </a>
                            <a href="tel:112" class="action-btn btn-ambulance">
                                <i data-lucide="truck"></i> CALL AMBULANCE
                            </a>
                            <a href="https://www.google.com/maps/search/hospital+near+me" target="_blank" class="action-btn btn-clinic">
                                <i data-lucide="hospital"></i> VISIT NEAREST CLINIC
                            </a>
                        </div>

                        <div class="lock-link">
                            <i data-lucide="lock"></i>
                            View Full Medical Record (OTP Required)
                        </div>
                    </div>

                    <div class="qr-footer">
                        <div class="qr-card-wrap">
                            <canvas id="qr-canvas"></canvas>
                        </div>
                        <div class="qr-instruction">Scan QR to access full medical record</div>
                    </div>
                </div>
            `;

            lucide.createIcons();

            // Generate QR
            const canvas = document.getElementById('qr-canvas');
            QRCode.toCanvas(canvas, window.location.href, {
                width: 140,
                margin: 0,
                color: {
                    dark: '#0f172a',
                    light: '#ffffff'
                }
            });
        });
    </script>
</body>
</html>
