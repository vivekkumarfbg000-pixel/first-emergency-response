<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚕ EMERGENCY PROFILE | Sehat Point</title>
    <meta name="description" content="Emergency medical profile — critical health data for first responders.">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>
    <style>
        :root {
            --card-bg: #ffffff;
            --header-red: #e11d48;
            --text-primary: #0f172a;
            --text-secondary: #64748b;
            --card-border: #e2e8f0;
            --icon-bg: #f1f5f9;
        }

        body {
            background: #f1f5f9;
            background-image: radial-gradient(circle at top right, rgba(225, 29, 72, 0.03), transparent 40%),
                              radial-gradient(circle at bottom left, rgba(59, 130, 246, 0.03), transparent 40%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            font-family: 'Inter', -apple-system, sans-serif;
            color: var(--text-primary);
        }

        .profile-container {
            width: 100%;
            max-width: 440px;
            background: #ffffff;
            border-radius: 32px;
            overflow: hidden;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05),
                        0 8px 10px -6px rgba(0, 0, 0, 0.05),
                        0 0 0 1px rgba(0, 0, 0, 0.05);
            animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ─── Header ─── */
        .emergency-banner {
            background: var(--header-red);
            color: white;
            padding: 0.875rem 1.25rem;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 0.5rem;
            font-weight: 800;
            font-size: 0.85rem;
            letter-spacing: 0.03em;
            text-transform: uppercase;
        }

        .emergency-banner i { width: 18px; height: 18px; }

        /* ─── Content ─── */
        .profile-content {
            padding: 2rem 1.5rem;
        }

        .patient-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .sehat-point-logo {
            font-weight: 900;
            font-size: 1.25rem;
            letter-spacing: -0.02em;
            margin-bottom: 0.5rem;
            color: #0f172a;
        }
        .sehat-point-logo span { color: var(--header-red); }

        .patient-name {
            font-size: 1.875rem;
            font-weight: 900;
            letter-spacing: -0.035em;
            margin-bottom: 0.5rem;
            color: #0f172a;
        }

        .last-updated {
            font-size: 0.65rem;
            font-weight: 700;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.35rem;
            opacity: 0.8;
        }

        /* ─── Medical Cards (Colorful on White) ─── */
        .med-card {
            background: #ffffff;
            border: 1px solid var(--card-border);
            border-radius: 20px;
            padding: 1.25rem;
            margin-bottom: 1rem;
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.02);
            transition: 0.2s ease-in-out;
        }

        .med-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.04);
        }

        .med-card-header {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 0.75rem;
        }

        .med-icon {
            width: 36px; height: 36px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            background: var(--icon-bg);
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
        }

        .med-icon i { width: 20px; height: 20px; }

        .med-title {
            font-size: 0.85rem;
            font-weight: 800;
            letter-spacing: 0.01em;
            text-transform: uppercase;
        }

        .med-value {
            font-size: 1rem;
            color: #1e293b;
            line-height: 1.6;
            font-weight: 600;
        }

        /* Customizing icons and accents */
        .card-condition { border-left: 4px solid #f43f5e; }
        .card-condition .med-icon { color: #f43f5e; background: rgba(244, 63, 94, 0.08); }
        .card-condition .med-title { color: #f43f5e; }

        .card-medications { border-left: 4px solid #3b82f6; }
        .card-medications .med-icon { color: #3b82f6; background: rgba(59, 130, 246, 0.08); }
        .card-medications .med-title { color: #3b82f6; }

        .card-allergies { border: 2px solid #ef4444; }
        .card-allergies .med-icon { color: #f59e0b; background: rgba(245, 158, 11, 0.08); }
        .card-allergies .med-title { color: #f59e0b; }
        .card-allergies .med-value { color: #ef4444; font-weight: 900; font-size: 1.125rem; }

        .card-notes { border-left: 4px solid #14b8a6; }
        .card-notes .med-icon { color: #14b8a6; background: rgba(20, 184, 166, 0.08); }
        .card-notes .med-title { color: #14b8a6; }

        /* ─── Health Summary Section (White Theme) ─── */
        .summary-section {
            background: #f8fafc;
            padding: 1.5rem;
            border-radius: 24px;
            margin-bottom: 2rem;
            border: 1px solid #e2e8f0;
            position: relative;
        }
        
        .summary-section::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; height: 6px;
            background: linear-gradient(90deg, #f43f5e, #3b82f6);
            border-radius: 24px 24px 0 0;
        }

        .summary-title {
            font-size: 0.75rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #475569;
            margin-bottom: 0.75rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .summary-text {
            font-size: 0.9375rem;
            color: #1e293b;
            line-height: 1.8;
            font-weight: 500;
            font-style: italic;
        }

        /* ─── Contact Actions ─── */
        .contact-section {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            padding: 1.25rem;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 1.25rem;
            margin-bottom: 1rem;
        }

        .contact-btn {
            width: 48px; height: 48px;
            background: #22c55e;
            color: white;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
            text-decoration: none;
            box-shadow: 0 4px 12px rgba(34, 197, 94, 0.25);
            transition: 0.2s;
        }
        .contact-btn:hover { transform: scale(1.05); }

        .contact-info b { font-size: 0.65rem; display: block; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.1rem; }
        .contact-info span { font-size: 1.125rem; font-weight: 800; color: #0f172a; }

        .action-btns {
            display: flex;
            flex-direction: column;
            gap: 0.875rem;
            margin-top: 2rem;
        }

        .btn-sehat {
            background: #ffffff;
            border: 1px solid #e2e8f0;
            color: #0f172a;
            padding: 1rem;
            border-radius: 16px;
            font-weight: 700;
            font-size: 0.875rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            text-decoration: none;
            transition: 0.2s;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }

        .btn-sehat:hover { 
            background: #f8fafc; 
            border-color: #cbd5e1;
            transform: translateY(-1px);
        }

        .blood-tag {
            background: #fef2f2;
            color: #f43f5e;
            padding: 0.25rem 0.75rem;
            border-radius: 8px;
            font-weight: 900;
            font-size: 1.125rem;
            margin-left: auto;
            border: 1px solid rgba(244, 63, 94, 0.1);
        }

        @media (max-width: 480px) {
            body { padding: 1rem; }
            .profile-container { border-radius: 28px; }
            .med-card { padding: 1rem; }
        }
    </style>
</head>
<body>
    <div id="app-root"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/storage.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const params = new URLSearchParams(window.location.search);
            let patient = null;

            // Decode data (Offline First)
            const encodedData = params.get('data');
            if (encodedData) {
                try {
                    patient = window.Storage.decodeFromURL(encodedData);
                } catch (e) { console.error('Decode failed', e); }
            }

            // Cloud Fetch if needed
            const id = params.get('id');
            if (!patient && id) {
                try {
                    const { data: row } = await window.supabaseClient.from('patients').select('*').eq('patient_id', id).single();
                    if (row) patient = window.Storage.mapFromDB(row);
                } catch (e) {}
            }

            if (!patient) {
                document.getElementById('app-root').innerHTML = "<div style='text-align:center; padding:3rem;'><h1 style='color:white;'>Profile Not Found</h1><p style='color:#94a3b8;'>Scan a valid Sehat Point QR Code.</p></div>";
                return;
            }

            const today = new Date().toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric' });

            // Generate Health Summary
            const healthSummary = `Patient ${patient.fullName} has ${patient.bloodGroup} blood group. ` + 
                                (patient.conditions ? `Reported conditions: ${patient.conditions}. ` : 'No chronic conditions reported. ') +
                                (patient.allergies ? `CRITICAL: Known allergies to ${patient.allergies}.` : 'No known allergies.');

            document.getElementById('app-root').innerHTML = `
                <div class="profile-container">
                    <div class="emergency-banner">
                        <i data-lucide="truck"></i>
                        VITAL EMERGENCY INFORMATION
                    </div>

                    <div class="profile-content">
                        <div class="patient-header">
                            <div class="sehat-point-logo">SEHAT <span>POINT</span></div>
                            <div class="patient-name">${patient.fullName}</div>
                            <div class="last-updated">
                                <i data-lucide="clock"></i>
                                UPDATED: ${today}
                            </div>
                        </div>

                        <!-- Summary Section -->
                        <div class="summary-section">
                            <div class="summary-title">
                                <i data-lucide="file-text" style="width:14px;"></i>
                                Health Report Summary
                            </div>
                            <div class="summary-text">${healthSummary}</div>
                        </div>

                        <!-- Medical Conditions Card -->
                        <div class="med-card card-condition">
                            <div class="med-card-header">
                                <div class="med-icon"><i data-lucide="activity"></i></div>
                                <div class="med-title">Medical Conditions</div>
                            </div>
                            <div class="med-value">${patient.conditions || 'None Reported / Stable'}</div>
                        </div>

                        <!-- Medications Card -->
                        <div class="med-card card-medications">
                            <div class="med-card-header">
                                <div class="med-icon"><i data-lucide="pill"></i></div>
                                <div class="med-title">Medications</div>
                            </div>
                            <div class="med-value">${patient.medications || 'No Regular Medications'}</div>
                        </div>

                        <!-- Critical Allergies Card -->
                        <div class="med-card card-allergies">
                            <div class="med-card-header">
                                <div class="med-icon"><i data-lucide="alert-triangle"></i></div>
                                <div class="med-title">Critical Allergies</div>
                                <div class="blood-tag">${patient.bloodGroup}</div>
                            </div>
                            <div class="med-value">${patient.allergies || 'NONE REPORTED'}</div>
                            <div style="font-size:0.65rem; color:#94a3b8; margin-top:0.5rem; font-weight:600;">Highlighted in RED on the Rescuer View</div>
                        </div>

                        <!-- Responder Notes Card -->
                        <div class="med-card card-notes">
                            <div class="med-card-header">
                                <div class="med-icon"><i data-lucide="clipboard-list"></i></div>
                                <div class="med-title">Responder Notes</div>
                            </div>
                            <div class="med-value">${patient.medicalNotes || 'No additional notes provided.'}</div>
                        </div>

                        <!-- Contact Actions -->
                        <div class="contact-section">
                            <a href="tel:${patient.contact1_Phone}" class="contact-btn">
                                <i data-lucide="phone" style="width:20px;"></i>
                            </a>
                            <div class="contact-info">
                                <b>Emergency Contact: ${patient.contact1_Name}</b>
                                <span>${patient.contact1_Phone}</span>
                            </div>
                        </div>

                        <div class="action-btns">
                            <a href="tel:${patient.contact1_Phone}" class="btn-sehat" style="background:rgba(34, 197, 94, 0.1); border-color: rgba(34, 197, 94, 0.2); color:#22c55e;">
                                <i data-lucide="phone"></i> CALL ${patient.contact1_Name.toUpperCase()}
                            </a>
                            <a href="https://wa.me/919999999999?text=Emergency%20help%20needed%10for%20${encodeURIComponent(patient.fullName)}" class="btn-sehat">
                                <i data-lucide="message-circle"></i> CONTACT SEHAT POINT
                            </a>
                        </div>
                    </div>
                </div>
            `;

            lucide.createIcons();
        });
    </script>
</body>
</html>
