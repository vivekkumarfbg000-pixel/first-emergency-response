<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚕ EMERGENCY PROFILE | Sehat Point</title>
    <meta name="description" content="Emergency medical profile — critical health data for first responders.">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>
    <style>
        :root {
            --profile-bg: #fffcf8; /* Light medical/beige tint */
            --text-dark: #1e293b;
            --text-muted: #64748b;
            
            /* Card Colors from Image */
            --bg-blood: #fff1f2;
            --text-blood: #be123c;
            
            --bg-allergy: #fff7ed;
            --text-allergy: #c2410c;
            
            --bg-condition: #fefce8;
            --text-condition: #1e293b;
            
            --bg-contact: #f1f5f9;
            --text-contact: #0f172a;
            
            --bg-summary: #f8fafc;
        }

        body {
            background: #fdfdfd;
            background-image: radial-gradient(circle at 50% 0%, #fff6e9 0%, transparent 50%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            font-family: 'Inter', -apple-system, sans-serif;
            color: var(--text-dark);
        }

        .profile-container {
            width: 100%;
            max-width: 440px;
            background: #ffffff;
            border-radius: 40px;
            padding: 3rem 1.75rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.08);
            animation: slideIn 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ─── Header Section ─── */
        .patient-name {
            font-size: 2rem;
            font-weight: 800;
            letter-spacing: -0.04em;
            margin-bottom: 0.75rem;
            color: #0f172a;
        }

        .updated-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: #fefce8;
            color: #854d0e;
            padding: 0.5rem 1rem;
            border-radius: 99px;
            font-size: 0.75rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 2rem;
        }

        /* ─── Horizontal Color Bars ─── */
        .info-bar {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 1.25rem 1.75rem;
            border-radius: 24px;
            margin-bottom: 1rem;
            font-weight: 700;
            font-size: 1.0625rem;
            border: 1px solid rgba(0,0,0,0.01);
            transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .info-bar:hover { transform: scale(1.01); }

        .info-bar i {
            width: 20px; height: 20px;
            flex-shrink: 0;
        }

        .info-bar .label {
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-weight: 800;
            font-size: 0.85rem;
        }

        .info-bar .value {
            margin-left: 0.25rem;
            font-weight: 800;
        }

        /* Specific Bar Styles */
        .bar-blood { background: var(--bg-blood); color: var(--text-blood); }
        .bar-allergy { background: var(--bg-allergy); color: var(--text-allergy); }
        .bar-condition { 
            background: var(--bg-condition); 
            color: var(--text-condition);
            flex-direction: column;
            align-items: flex-start;
            gap: 0.5rem;
        }
        .bar-condition .main-row { display: flex; align-items: center; gap: 1rem; }

        .high-risk-badge {
            background: #f97316;
            color: white;
            font-size: 0.65rem;
            font-weight: 900;
            padding: 0.4rem 0.8rem;
            border-radius: 8px;
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            text-transform: uppercase;
            margin-top: 0.25rem;
            box-shadow: 0 4px 10px rgba(249, 115, 22, 0.2);
        }

        .bar-contact { 
            background: var(--bg-contact); 
            color: var(--text-contact);
            padding: 1.25rem 1.5rem;
        }
        .bar-contact .contact-details {
            display: flex;
            flex-direction: column;
            gap: 0.1rem;
        }
        .bar-contact .contact-details b { font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; }
        .bar-contact .contact-details span { font-size: 1.125rem; font-weight: 800; }
        .bar-contact i { color: #10b981; }

        .bar-summary { 
            background: var(--bg-summary); 
            color: var(--text-dark);
            align-items: flex-start;
        }
        .bar-summary .summary-content {
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }
        .bar-summary .summary-content b { font-size: 0.75rem; text-transform: uppercase; color: var(--text-muted); }
        .bar-summary i { color: #64748b; }

        /* ─── Action Buttons Row ─── */
        .btn-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.75rem;
            margin-top: 1.5rem;
        }

        .btn-medical {
            padding: 1.125rem;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            font-weight: 800;
            font-size: 0.875rem;
            text-decoration: none;
            color: white;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            transition: 0.2s;
        }

        .btn-medical:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(0,0,0,0.1); }

        .btn-family { background: #22c55e; }
        .btn-ambulance { background: #ef4444; }
        .btn-clinic { 
            grid-column: span 2; 
            background: #3b82f6; 
            margin-top: 0.5rem;
        }

        .footer-link {
            display: block;
            text-align: center;
            margin-top: 2rem;
            color: #64748b;
            font-size: 0.85rem;
            font-weight: 700;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }
        .footer-link i { width: 14px; }
        
        @media (max-width: 400px) {
            .btn-row { grid-template-columns: 1fr; }
            .btn-clinic { grid-column: span 1; }
        }
    </style>
</head>
<body>
    <div id="app-root"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/storage.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const params = new URLSearchParams(window.location.search);
            let patient = null;

            // Decode data (Offline First)
            const encodedData = params.get('data');
            if (encodedData) {
                try {
                    patient = window.Storage.decodeFromURL(encodedData);
                } catch (e) { console.error('Decode failed', e); }
            }

            // Cloud/Local Fetch if needed
            const id = params.get('id');
            if (!patient && id) {
                try {
                    patient = await window.Storage.getPatientById(id);
                } catch (e) {
                    console.error('Cloud fetch failed', e);
                }
            }

            if (!patient) {
                document.getElementById('app-root').innerHTML = "<div style='text-align:center; padding:3rem;'><h1 style='color:white;'>Profile Not Found</h1><p style='color:#94a3b8;'>Scan a valid Sehat Point QR Code.</p></div>";
                return;
            }

            const today = new Date().toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric' });

            // Generate Health Summary
            const healthSummary = `Patient ${patient.fullName} has ${patient.bloodGroup} blood group. ` + 
                                (patient.conditions ? `Reported conditions: ${patient.conditions}. ` : 'No chronic conditions reported. ') +
                                (patient.allergies ? `CRITICAL: Known allergies to ${patient.allergies}.` : 'No known allergies.');

            document.getElementById('app-root').innerHTML = `
                <div class="profile-container">
                    <div class="patient-header">
                        <div class="patient-name">${patient.fullName}</div>
                        <div class="updated-badge">
                            <i data-lucide="calendar"></i>
                            LAST UPDATED: ${today}
                        </div>
                    </div>

                    <!-- Blood Group Card -->
                    <div class="info-bar bar-blood">
                        <i data-lucide="droplet"></i>
                        <span class="label">BLOOD GROUP:</span>
                        <span class="value">${patient.bloodGroup}</span>
                    </div>

                    <!-- Allergy Card -->
                    <div class="info-bar bar-allergy">
                        <i data-lucide="alert-triangle"></i>
                        <span class="label">ALLERGY:</span>
                        <span class="value">${patient.allergies || 'NONE REPORTED'}</span>
                    </div>

                    <!-- Condition Card -->
                    <div class="info-bar bar-condition">
                        <div class="main-row">
                            <i data-lucide="heart" style="color:#ef4444;"></i>
                            <span class="label">CONDITION:</span>
                            <span class="value">${patient.conditions || 'None Reported'}</span>
                        </div>
                        ${patient.conditions ? `<div class="high-risk-badge"><i data-lucide="alert-circle"></i> HIGH RISK PATIENT</div>` : ''}
                    </div>

                    <!-- Emergency Contact Card -->
                    <div class="info-bar bar-contact">
                        <i data-lucide="phone"></i>
                        <div class="contact-details">
                            <b>EMERGENCY CONTACT: ${patient.contact1_Relation || 'Primary'}</b>
                            <span>${patient.contact1_Name} ${patient.contact1_Phone}</span>
                        </div>
                    </div>

                    <!-- Summary Card -->
                    <div class="info-bar bar-summary">
                        <i data-lucide="clipboard"></i>
                        <div class="summary-content">
                            <b>SUMMARY:</b>
                            <div style="font-size:0.875rem; color:#475569; font-weight:500;">${healthSummary}</div>
                        </div>
                    </div>

                    <!-- Action Buttons -->
                    <div class="btn-row">
                        <a href="tel:${patient.contact1_Phone}" class="btn-medical btn-family">
                            <i data-lucide="phone"></i>
                            CALL FAMILY
                        </a>
                        <a href="tel:112" class="btn-medical btn-ambulance">
                            <i data-lucide="truck"></i>
                            CALL AMBULANCE
                        </a>
                        <a href="https://www.google.com/maps/search/nearest+clinic+hospital" target="_blank" class="btn-medical btn-clinic">
                            <i data-lucide="map-pin"></i>
                            VISIT NEAREST CLINIC
                        </a>
                    </div>

                    <!-- Footer Link -->
                    <a href="#" class="footer-link">
                        <i data-lucide="lock"></i>
                        View Full Medical Record (OTP Required)
                    </a>
                </div>
            `;

            lucide.createIcons();
        });
    </script>
</body>
</html>
